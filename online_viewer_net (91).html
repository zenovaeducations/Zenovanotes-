<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenova Educations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:400px;
}

.check{
    width:90px;
    height:90px;
    border:2px solid #fff;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:42px;
    animation:pop .8s ease;
}

.logo{
    margin-top:35px;
}

.logo h1{
    font-size:32px;
    letter-spacing:4px;
    font-weight:800;
}

.logo p{
    font-size:12px;
    letter-spacing:8px;
    color:#bdbdbd;
}

h2{
    margin-top:35px;
    font-size:28px;
}

.message{
    margin-top:15px;
    color:#bdbdbd;
    line-height:28px;
    font-size:15px;
}

.loading{
    margin:45px auto 0;
    width:42px;
    height:42px;
    border:3px solid #333;
    border-top:3px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

.redirect{
    margin-top:18px;
    color:#8e8e8e;
    font-size:13px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes pop{
    0%{
        transform:scale(.3);
        opacity:0;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="check">✓</div>

    <div class="logo">
        <h1>ZENOVA</h1>
        <p>EDUCATIONS</p>
    </div>

    <h2>Thank You!</h2>

    <p class="message">
        Your admission and fee details have been submitted successfully.<br><br>
        Please wait while we prepare your student dashboard...
    </p>

    

</div>



</body>
</html>
